<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="title" content="Pixel Animation HTML5/Javascript" />
  <title>Pixel Animation HTML5/Javascript</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #container {
      width: 100%;
      height: 100%;
    }

    #myCanvas {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      background-color: #000;
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="myCanvas" width="1280" height="720"></canvas>
  </div>

  <script src="pixelanimation.js"></script>
</body>
</html>
